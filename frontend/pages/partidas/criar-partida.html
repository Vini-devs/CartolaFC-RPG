<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Criar Partida - Cartola FC RPG</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link href="../../assets/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav id="navbar-container"></nav>
    <script>
      fetch("../../components/navbar.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("navbar-container").innerHTML = data;
        });
    </script>
    <div class="container mt-4">
      <h1>Nova Partida</h1>
      <form id="form-criar-partida">
        <div class="mb-3">
          <label for="timeIdCasa" class="form-label">Time da Casa</label>
          <select
            class="form-select"
            id="timeIdCasa"
            name="timeIdCasa"
            required
          ></select>
        </div>
        <div class="mb-3">
          <label for="timeIdFora" class="form-label">Time Visitante</label>
          <select
            class="form-select"
            id="timeIdFora"
            name="timeIdFora"
            required
          ></select>
        </div>
        <div class="mb-3">
          <label for="placarCasa" class="form-label">Placar da Casa</label>
          <input
            type="number"
            class="form-control"
            id="placarCasa"
            name="placarCasa"
            required
            value="0"
            min="0"
          />
        </div>
        <div class="mb-3">
          <label for="placarFora" class="form-label">Placar do Visitante</label>
          <input
            type="number"
            class="form-control"
            id="placarFora"
            name="placarFora"
            required
            value="0"
            min="0"
          />
        </div>
        <div class="mb-3">
          <label for="data" class="form-label">Data e Hora</label>
          <input
            type="datetime-local"
            class="form-control"
            id="data"
            name="data"
            required
          />
        </div>
        <button type="submit" class="btn btn-success">Criar</button>
        <a href="partidas.html" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>
    <script src="../../assets/js/script-partidas.js"></script>
    <script>
      loadCriarPartida();
    </script>
  </body>
</html>
