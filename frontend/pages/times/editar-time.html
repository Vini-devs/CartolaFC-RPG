<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Time - Cartola FC RPG</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav id="navbar-container"></nav>
    <script>
      fetch("../../components/navbar.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("navbar-container").innerHTML = data;
        });
    </script>
    <div class="container">
      <h2>Editar Time</h2>
      <form id="form-editar-time">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome do Time</label>
          <input
            type="text"
            class="form-control"
            id="nome"
            name="nome"
            required
          />
        </div>
        <div class="mb-3">
          <label for="sigla" class="form-label">Sigla</label>
          <input
            type="text"
            class="form-control"
            id="sigla"
            name="sigla"
            maxlength="5"
          />
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="times.html" class="btn btn-secondary ms-2">Cancelar</a>
      </form>
    </div>
    <script src="../../assets/js/script-times.js"></script>
    <script>
      loadEditarTime();
    </script>
  </body>
</html>
