<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Editar Jogador - Cartola FC RPG</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link href="../../assets/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav id="navbar-container"></nav>
    <script>
      fetch("../../components/navbar.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("navbar-container").innerHTML = data;
        });
    </script>
    <div class="container mt-4">
      <h1>Editar Jogador</h1>
      <form id="form-editar-jogador">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome</label>
          <input
            type="text"
            class="form-control"
            id="nome"
            name="nome"
            required
          />
        </div>
        <div class="mb-3">
          <label for="posicao" class="form-label">Posição</label>
          <input
            type="text"
            class="form-control"
            id="posicao"
            name="posicao"
            required
          />
        </div>
        <div class="mb-3">
          <label for="timeId" class="form-label">Time</label>
          <select class="form-control" id="timeId" name="timeId" required>
            <option value="">Selecione o time</option>
          </select>
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="jogadores.html" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>
    <script src="../../assets/js/script-jogadores.js"></script>
    <script>
      function preencherTimesSelectEditarJogador(selectedId) {
        fetch("http://localhost:5023/times")
          .then((r) => r.json())
          .then((times) => {
            const select = document.getElementById("timeId");
            select.innerHTML = '<option value="">Selecione o time</option>';
            times.forEach((t) => {
              const opt = document.createElement("option");
              opt.value = t.id;
              opt.textContent = t.nome;
              if (t.id == selectedId) opt.selected = true;
              select.appendChild(opt);
            });
          });
      }
      // Carregar jogador e preencher select
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      fetch(`http://localhost:5023/jogadores/${id}`)
        .then((r) => r.json())
        .then((jogador) => {
          document.getElementById("nome").value = jogador.nome;
          document.getElementById("posicao").value = jogador.posicao || "";
          preencherTimesSelectEditarJogador(jogador.timeId);
        });
      loadEditarJogador();
    </script>
  </body>
</html>
