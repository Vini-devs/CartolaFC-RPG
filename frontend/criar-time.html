<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Time - Cartola FC RPG</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Cartola FC RPG</a>
      </div>
    </nav>
    <div class="container">
      <h2>Criar Novo Time</h2>
      <form id="form-criar-time">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome do Time</label>
          <input
            type="text"
            class="form-control"
            id="nome"
            name="nome"
            required
          />
        </div>
        <div class="mb-3">
          <label for="sigla" class="form-label">Sigla</label>
          <input
            type="text"
            class="form-control"
            id="sigla"
            name="sigla"
            maxlength="5"
          />
        </div>
        <div class="mb-3">
          <label for="urlEscudo" class="form-label">URL do Escudo</label>
          <input
            type="url"
            class="form-control"
            id="urlEscudo"
            name="urlEscudo"
          />
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="times.html" class="btn btn-secondary ms-2">Cancelar</a>
      </form>
    </div>
    <script src="script-times.js"></script>
    <script>
      loadCriarTime();
    </script>
  </body>
</html>
