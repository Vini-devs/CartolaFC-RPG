<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Criar Torneio</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-4">
      <h1>Novo Torneio</h1>
      <form id="form-criar-torneio">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome</label>
          <input
            type="text"
            class="form-control"
            id="nome"
            name="nome"
            required
          />
        </div>
        <button type="submit" class="btn btn-success">Criar</button>
        <a href="torneios.html" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>
    <script src="script-torneios.js"></script>
    <script>
      loadCriarTorneio();
    </script>
  </body>
</html>
