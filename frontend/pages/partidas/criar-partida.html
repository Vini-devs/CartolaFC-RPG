<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Partida - Cartola FC RPG</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="../../assets/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="../../index.html">Cartola FC RPG</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="../times/times.html">Times</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../jogadores/jogadores.html">Jogadores</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="../partidas/partidas.html">Partidas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../torneios/torneios.html">Torneios</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container">
      <h1>Criar Partida</h1>
      <form id="form-criar-partida">
        <div class="mb-3">
          <label for="timeIdCasa" class="form-label">Time da Casa</label>
          <select class="form-select" id="timeIdCasa" name="timeIdCasa" required></select>
        </div>
        <div class="mb-3">
          <label for="timeIdFora" class="form-label">Time Visitante</label>
          <select class="form-select" id="timeIdFora" name="timeIdFora" required></select>
        </div>
        <div class="mb-3">
          <label for="placarCasa" class="form-label">Placar da Casa</label>
          <input type="number" class="form-control" id="placarCasa" name="placarCasa" required min="0" />
        </div>
        <div class="mb-3">
          <label for="placarFora" class="form-label">Placar do Visitante</label>
          <input type="number" class="form-control" id="placarFora" name="placarFora" required min="0" />
        </div>
        <div class="mb-3">
          <label for="data" class="form-label">Data e Hora</label>
          <input type="datetime-local" class="form-control" id="data" name="data" required />
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="partidas.html" class="btn btn-secondary ms-2">Cancelar</a>
      </form>
    </div>
    <script src="../../assets/js/script-partidas.js"></script>
    <script>loadCriarPartida();</script>
  </body>
</html>
