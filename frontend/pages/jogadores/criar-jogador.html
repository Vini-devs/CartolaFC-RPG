<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Criar Jogador</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-4">
      <h1>Novo Jogador</h1>
      <form id="form-criar-jogador">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome</label>
          <input
            type="text"
            class="form-control"
            id="nome"
            name="nome"
            required
          />
        </div>
        <div class="mb-3">
          <label for="posicao" class="form-label">Posição</label>
          <input
            type="text"
            class="form-control"
            id="posicao"
            name="posicao"
            required
          />
        </div>
        <div class="mb-3">
          <label for="timeId" class="form-label">Time</label>
          <select class="form-control" id="timeId" name="timeId" required>
            <option value="">Selecione o time</option>
          </select>
        </div>
        <button type="submit" class="btn btn-success">Criar</button>
        <a href="jogadores.html" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>
    <script src="script-jogadores.js"></script>
    <script>
      function preencherTimesSelect() {
        fetch("../../api/times")
          .then((r) => r.json())
          .then((times) => {
            const select = document.getElementById("timeId");
            times.forEach((t) => {
              const opt = document.createElement("option");
              opt.value = t.id;
              opt.textContent = t.nome;
              select.appendChild(opt);
            });
          });
      }
      preencherTimesSelect();
      loadCriarJogador();
    </script>
  </body>
</html>
