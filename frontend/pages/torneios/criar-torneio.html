<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Criar Torneio - Cartola FC RPG</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link href="../../assets/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav id="navbar-container"></nav>
    <script>
      fetch("../../components/navbar.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("navbar-container").innerHTML = data;
        });
    </script>
    <div class="container mt-4">
      <h1>Novo Torneio</h1>
      <form id="form-criar-torneio">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome</label>
          <input
            type="text"
            class="form-control"
            id="nome"
            name="nome"
            required
          />
        </div>
        <div class="mb-3">
          <label for="partida1Id" class="form-label">Partida 1</label>
          <select class="form-control" id="partida1Id" name="partida1Id">
            <option value="">Selecione a partida 1</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="partida2Id" class="form-label">Partida 2</label>
          <select class="form-control" id="partida2Id" name="partida2Id">
            <option value="">Selecione a partida 2</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="partida3Id" class="form-label">Partida 3</label>
          <select class="form-control" id="partida3Id" name="partida3Id">
            <option value="">Selecione a partida 3</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="partida4Id" class="form-label">Partida 4</label>
          <select class="form-control" id="partida4Id" name="partida4Id">
            <option value="">Selecione a partida 4</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="partida5Id" class="form-label">Partida 5</label>
          <select class="form-control" id="partida5Id" name="partida5Id">
            <option value="">Selecione a partida 5</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="partida6Id" class="form-label">Partida 6</label>
          <select class="form-control" id="partida6Id" name="partida6Id">
            <option value="">Selecione a partida 6</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="partida7Id" class="form-label">Partida 7</label>
          <select class="form-control" id="partida7Id" name="partida7Id">
            <option value="">Selecione a partida 7</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="partida8Id" class="form-label">Partida 8</label>
          <select class="form-control" id="partida8Id" name="partida8Id">
            <option value="">Selecione a partida 8</option>
          </select>
        </div>
        <button type="submit" class="btn btn-success">Criar</button>
        <a href="torneios.html" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>
    <script src="../../assets/js/script-torneios.js"></script>
    <script>
      loadCriarTorneio();
    </script>
  </body>
</html>
